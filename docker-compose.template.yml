version: '3.8'

services:
  poky:
    image: ${POKY_IMAGE}
    container_name: poky_container
    volumes:
      - ${VOLUME_NAME}_workdir:/workdir
      - ${PROJECT_TOP}:/workspace
      - ${SSH_PATH}:/home/vari/.ssh
    ports:
      - "${FILEBROWSER_PORT}:9200"
      - "${DL_PORT}:9210"
    environment:
      - WORKDIR_UID=${WORKDIR_UID}
      - WORKDIR_GID=${WORKDIR_GID}
    command: /bin/bash

  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    volumes:
      - ${VOLUME_NAME}_workdir:/workdir
    ports:
      - "${FILEBROWSER_PORT}:8080"
    environment:
      - FILEBROWSER_PORT=${FILEBROWSER_PORT}

  rpm-host:
    image: rpm-host-image
    container_name: rpm_host
    volumes:
      - ${VOLUME_NAME}_workdir:/workdir
    ports:
      - "${DL_PORT}:80"
    environment:
      - DL_PORT=${DL_PORT}

  nfs-server:
    image: nfs-server-image
    container_name: nfs_server
    volumes:
      - ${VOLUME_NAME}_workdir:/workdir
    ports:
      - "2049:2049"
    environment:
      - NFS_EXPORT_PATH=/workdir

networks:
  default:
    driver: bridge

volumes:
  ${VOLUME_NAME}_workdir:
    driver: local